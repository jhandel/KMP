# KMP Development Environment - Docker Compose
# Optimized for agentic/hosted development with local code mounting
#
# Usage:
#   docker compose up -d        # Start all services
#   docker compose down         # Stop all services
#   docker compose logs -f app  # Follow app logs
#   ./dev-reset-db.sh           # Reset database to clean state
#
# Services:
#   - app: PHP 8.3 + Apache (your code mounted at /var/www/html)
#   - db: MariaDB with persistent volume
#   - mailpit: Email testing (UI at http://localhost:8025)

services:
  db:
    image: mariadb:11
    container_name: kmp-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DB_NAME:-KMP_DEV}
      MYSQL_USER: ${MYSQL_USERNAME:-KMPSQLDEV}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-P@ssw0rd}
    ports:
      - "3306:3306"
    volumes:
      - kmp-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  mailpit:
    image: axllent/mailpit:latest
    container_name: kmp-mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"  # Web UI
      - "1025:1025"  # SMTP
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: "true"
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.app
    container_name: kmp-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      mailpit:
        condition: service_started
    ports:
      - "8080:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Mount the repo root for git-aware tools and repo-level test fixtures.
      - .:/var/www:cached
      # Mount app code at Apache's working directory; changes reflect immediately.
      - ./app:/var/www/html:cached
      # Keep heavyweight dependencies and tool caches in Docker volumes so
      # host worktrees stay clean while app code remains live-mounted.
      - vendor:/var/www/html/vendor
      - composer-cache:/root/.composer/cache
      - node-modules:/var/www/html/node_modules
      - npm-cache:/root/.npm
      - playwright-cache:/ms-playwright
    environment:
      # App identification (prevents .env loading - we use container env vars)
      APP_NAME: KMP_DOCKER
      # Database
      MYSQL_HOST: db
      MYSQL_PORT: "3306"
      MYSQL_USERNAME: ${MYSQL_USERNAME:-KMPSQLDEV}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-P@ssw0rd}
      MYSQL_DB_NAME: ${MYSQL_DB_NAME:-KMP_DEV}
      PLATFORM_DB_HOST: db
      PLATFORM_DB_PORT: "3306"
      PLATFORM_DB_USERNAME: ${MYSQL_USERNAME:-KMPSQLDEV}
      PLATFORM_DB_PASSWORD: ${MYSQL_PASSWORD:-P@ssw0rd}
      PLATFORM_DB_DATABASE: ${PLATFORM_DB_DATABASE:-KMP_PLATFORM}
      TENANT_DB_HOST: db
      TENANT_DB_PORT: "3306"
      TENANT_DB_USERNAME: ${MYSQL_USERNAME:-KMPSQLDEV}
      TENANT_DB_PASSWORD: ${MYSQL_PASSWORD:-P@ssw0rd}
      TENANT_DB_DATABASE: ${MYSQL_DB_NAME:-KMP_DEV}
      LOCALDEV_SMTP_PASSWORD: ""
      # Email
      EMAIL_SMTP_HOST: mailpit
      EMAIL_SMTP_PORT: "1025"
      EMAIL_SMTP_USERNAME: ""
      EMAIL_SMTP_PASSWORD: ""
      # PHP/App settings
      PHP_MEMORY_LIMIT: 256M
      APACHE_DOCUMENT_ROOT: /var/www/html
      # Browser binaries are installed in a named Docker volume.
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  kmp-db-data:
    name: kmp-db-data
  composer-cache:
    name: kmp-composer-cache
  vendor:
    name: kmp-vendor
  node-modules:
    name: kmp-node-modules
  npm-cache:
    name: kmp-npm-cache
  playwright-cache:
    name: kmp-playwright-cache
